name: Production Deploy
concurrency:
  group: ${{ github.ref }}-prd
  cancel-in-progress: false

on:
  push:
    branches: ['main']
    paths:
      - CHANGELOG.md
      - .release-please-manifest.json

permissions:
  contents: read

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      is-release: ${{ steps.check.outputs.is-release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check if Release Please PR
        id: check
        run: |
          # Extract version from the latest commit message
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MESSAGE" =~ chore\(main\):\ release\ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "is-release=true" >> $GITHUB_OUTPUT
            echo "tag=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "✅ Release detected: ${BASH_REMATCH[1]}"
          else
            echo "is-release=false" >> $GITHUB_OUTPUT
            echo "❌ Not a release commit"
          fi

  deploy-analytics:
    name: Deploy Analytics
    needs: check-release
    if: needs.check-release.outputs.is-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Tag
        env:
          IMAGE_TAG: ${{ needs.check-release.outputs.tag }}
        run: |
          URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/crm-analytics"

          docker build --file ./apps/analytics/Dockerfile --platform linux/amd64 --target production -t analytics .
          
          docker tag analytics:latest $URI:$IMAGE_TAG
          docker push $URI:$IMAGE_TAG

          docker tag analytics:latest $URI:latest
          docker push $URI:latest

      - name: Update ECS
        run: |
          aws ecs update-service \
            --cluster crm-cluster \
            --service analytics \
            --force-new-deployment
          echo "Analytics deployment to Production triggered!"

