name: Release Please
concurrency:
  group: ${{ github.ref }}-prd
  cancel-in-progress: false

on:
  push:
    branches: ['main']

permissions:
  contents: write
  pull-requests: write

jobs:
  src-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      number: ${{ steps.get_issue_number.outputs.result }}
    steps:
      - uses: actions/github-script@v6
        id: get_issue_number
        with:
          script: |
            const prs = (
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                commit_sha: context.sha,
                owner: context.repo.owner,
                repo: context.repo.repo,
              })
            ).data;
            return prs.length > 0 ? prs[0].number : '';
          result-encoding: string
      - name: Issue number
        run: echo '${{ steps.get_issue_number.outputs.result }}'

  release-please:
    runs-on: ubuntu-latest
    needs:
      - src-pr
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_GITHUB_TOKEN }}
          release-type: simple
